<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ops AI Initiatives — Nium</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #e8e6e1;
    --surface: #ffffff;
    --surface2: #f0ede8;
    --border: #d4d1cb;
    --border-strong: #b8b4ac;
    --text: #0a0a0a;
    --text-dim: #4a4845;
    --text-muted: #9a978f;
    --mint: #00f5c4;
    --mint-text: #006e55;
    --mint-bg: rgba(0,245,196,0.12);
    --mint-border: rgba(0,245,196,0.40);
    --green: #00a878;
    --green-bg: rgba(0,168,120,0.10);
    --amber: #b87d0a;
    --amber-bg: rgba(184,125,10,0.12);
    --amber-border: rgba(184,125,10,0.30);
    --red: #c0392b;
    --red-bg: rgba(192,57,43,0.10);
    --red-border: rgba(192,57,43,0.30);
    --gray: #8a8780;
    --gray-bg: rgba(138,135,128,0.10);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    padding: 0 48px;
    height: 64px;
    border-bottom: 1px solid var(--border-strong);
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    background: rgba(232,230,225,0.96);
    z-index: 100;
    backdrop-filter: blur(16px);
  }

  .header-left { display: flex; align-items: center; gap: 20px; }

  .nium-logo {
    display: inline-flex;
    align-items: center;
    background: var(--mint);
    padding: 6px 11px 5px;
  }

  .nium-logo span {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.22em;
    color: #0a0a0a;
    text-transform: uppercase;
  }

  .header-divider { width: 1px; height: 20px; background: var(--border-strong); }

  .header-title {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .header-stats { display: flex; align-items: stretch; height: 100%; }

  .stat-block {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-end;
    padding: 0 24px;
    border-left: 1px solid var(--border);
  }

  .stat-num {
    font-family: 'Space Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }
  .stat-num.mint { color: var(--mint-text); }
  .stat-num.amber { color: var(--amber); }
  .stat-num.red { color: var(--red); }

  .stat-lbl {
    font-size: 9px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    margin-top: 3px;
  }

  /* MAIN */
  .main {
    padding: 32px 48px 48px;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* Summary bar */
  .summary-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 32px;
  }

  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .summary-card.on-track { border-top: 3px solid var(--green); }
  .summary-card.behind { border-top: 3px solid var(--amber); }
  .summary-card.at-risk { border-top: 3px solid var(--red); }
  .summary-card.total { border-top: 3px solid var(--mint); }

  .summary-card .sc-num {
    font-family: 'Space Mono', monospace;
    font-size: 32px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }
  .summary-card.on-track .sc-num { color: var(--green); }
  .summary-card.behind .sc-num { color: var(--amber); }
  .summary-card.at-risk .sc-num { color: var(--red); }
  .summary-card.total .sc-num { color: var(--mint-text); }

  .summary-card .sc-lbl {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-muted);
  }

  /* Section label */
  .section-lbl {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  /* Table header */
  .table-head {
    display: grid;
    grid-template-columns: 1.8fr 2.2fr 1.8fr 1.5fr 1.2fr;
    gap: 16px;
    padding: 8px 20px;
    margin-bottom: 4px;
  }

  .th {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--text-muted);
  }

  .th.right { text-align: right; }

  /* Initiative rows */
  .ini-row {
    display: grid;
    grid-template-columns: 1.8fr 2.2fr 1.8fr 1.5fr 1.2fr;
    gap: 16px;
    padding: 18px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    margin-bottom: 4px;
    align-items: start;
    transition: background 0.1s, box-shadow 0.1s;
    cursor: default;
  }

  .ini-row:hover {
    background: #fafaf8;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }

  .ini-row.behind-schedule { border-left: 3px solid var(--amber); }
  .ini-row.at-risk { border-left: 3px solid var(--red); }
  .ini-row.on-track { border-left: 3px solid var(--green); }

  /* Name col */
  .col-name {}

  .ini-name {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.01em;
    margin-bottom: 4px;
  }

  .ini-owner {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
  }

  /* Description col */
  .col-desc {}

  .ini-objective {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  .ini-desc {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.55;
  }

  .ini-desc.empty {
    color: var(--text-muted);
    font-style: italic;
  }

  /* Benefits col */
  .col-benefits {}

  .ini-benefits {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.55;
  }

  .ini-benefits.empty {
    color: var(--text-muted);
    font-style: italic;
  }

  /* Go live col */
  .col-golive { text-align: right; }

  .golive-date {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
  }

  .golive-date.empty { color: var(--text-muted); font-weight: 400; }

  .current-stage {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 4px;
    text-align: right;
  }

  /* Health col */
  .col-health { display: flex; justify-content: flex-end; align-items: flex-start; }

  .health-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 5px 10px;
    border-radius: 2px;
    white-space: nowrap;
  }

  .health-badge.on-track {
    background: var(--green-bg);
    color: var(--green);
  }

  .health-badge.behind-schedule {
    background: var(--amber-bg);
    color: var(--amber);
    border: 1px solid var(--amber-border);
  }

  .health-badge.at-risk {
    background: var(--red-bg);
    color: var(--red);
    border: 1px solid var(--red-border);
  }

  .health-badge.not-started {
    background: var(--gray-bg);
    color: var(--gray);
  }

  .hpip {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
  }

  .hpip.blink { animation: blink 2s infinite; }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

  /* Updated timestamp */
  .updated {
    margin-top: 24px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    text-align: right;
  }

  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .ini-row { animation: fadeUp 0.2s ease both; }
  ${[...Array(11)].map((_,i) => `.ini-row:nth-child(${i+1}) { animation-delay: ${i*0.04}s; }`).join('\n  ')}
</style>
</head>

const NAMES = [
  'AI-Powered Automation','Intelligent Workflow Engine','Conversational AI Interface',
  'Predictive Analytics Platform','Smart Document Processing','AI Operations Monitoring',
  'NLP Integration Suite','Automated QA Framework','AI Data Pipeline',
  'Customer Intelligence AI','Ops AI Tooling',
];

// Placeholder descriptions — to be populated
const OBJECTIVES = Array(11).fill(null);
const DESCRIPTIONS = Array(11).fill(null);
const BENEFITS = Array(11).fill(null);

const M = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function parseDate(str) {
  if (!str) return null;
  const [y,mo,d] = str.split('-');
  return new Date(+y, +mo-1, +d);
}

function fmtDate(str) {
  if (!str) return null;
  const [y,mo,d] = str.split('-');
  return `${parseInt(d)} ${M[parseInt(mo)-1]} ${y}`;
}

function calcHealth(stages, goLiveDate) {
  const allNotStarted = stages.every(s => s.status === 'Not Started') && stages.every(s => !s.range);
  if (allNotStarted) return 'not-started';

  // At Risk: go live date has passed and deployment not done
  if (goLiveDate) {
    const depStage = stages.find(s => s.stage === 'Deployment');
    const goLive = parseDate(goLiveDate);
    if (goLive && goLive < TODAY && depStage && depStage.status !== 'Done') {
      return 'at-risk';
    }
  }

  // Behind Schedule: any stage's end date has passed and it's not done
  for (const s of stages) {
    if (s.status === 'Done') continue;
    if (s.range) {
      const endStr = s.range.split(' - ')[1];
      const end = parseDate(endStr);
      if (end && end < TODAY) return 'behind-schedule';
    }
  }

  return 'on-track';
}

const owners = [...new Set(raw.map(r => r.owner))];
const initiatives = owners.map((owner, i) => {
  const stages = raw.filter(r => r.owner === owner);
  const depStage = stages.find(s => s.stage === 'Deployment');
  const goLiveDate = depStage?.range ? depStage.range.split(' - ')[1] : null;
  const currentStage = stages.find(s => s.status === 'In Progress') || stages.find(s => s.status === 'Not Started');
  const health = calcHealth(stages, goLiveDate);
  return {
    id: i,
    name: NAMES[i],
    owner: owner.replace(' (2)', ''),
    stages,
    goLiveDate,
    currentStage,
    health,
    objective: OBJECTIVES[i],
    description: DESCRIPTIONS[i],
    benefits: BENEFITS[i],
  };
});

// Health counts

['h-ontrack','s-ontrack'].forEach(id => document.getElementById(id).textContent = counts['on-track']);
['h-behind','s-behind'].forEach(id => document.getElementById(id).textContent = counts['behind-schedule']);
['h-atrisk','s-atrisk'].forEach(id => document.getElementById(id).textContent = counts['at-risk']);

  const goLive = ini.goLiveDate ? fmtDate(ini.goLiveDate) : null;
  const curStageName = ini.currentStage ? ini.currentStage.stage : '—';
  const isPulsing = ini.health === 'behind-schedule' || ini.health === 'at-risk';

  return `
    <div class="ini-row ${ini.health}">
      <div class="col-name">
        <div class="ini-name">${ini.name}</div>
        <div class="ini-owner">${ini.owner}</div>
      </div>
      <div class="col-desc">
        <div class="ini-objective">${ini.objective || 'Objective'}</div>
        <div class="ini-desc ${!ini.description ? 'empty' : ''}">${ini.description || 'To be added'}</div>
      </div>
      <div class="col-benefits">
        <div class="ini-benefits ${!ini.benefits ? 'empty' : ''}">${ini.benefits || 'To be added'}</div>
      </div>
      <div class="col-golive">
        <div class="golive-date ${!goLive ? 'empty' : ''}">${goLive || '—'}</div>
        <div class="current-stage">Stage: ${curStageName}</div>
      </div>
      <div class="col-health">
        <span class="health-badge ${ini.health}">
          <span class="hpip ${isPulsing ? 'blink' : ''}"></span>
          ${healthLabel[ini.health]}
        </span>
      </div>
    </div>`;
}

document.getElementById('ini-list').innerHTML = initiatives.map(renderRow).join('');

// Updated timestamp
const now = new Date();
document.getElementById('updated-ts').textContent =
  `Last updated: ${now.toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'})} · Data source: monday.com Ops AI Initiatives`;
</script>
</body>
</html>
